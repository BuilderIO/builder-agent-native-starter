name: Sync agent-native starter manifest

on:
  workflow_dispatch:
  schedule:
    # Safety net when agent-native template changes do not send repository_dispatch.
    - cron: "43 * * * *"
  repository_dispatch:
    types: [agent-native-starter-template-changed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: starter-agent-native-automation
  cancel-in-progress: true

env:
  UPDATE_BRANCH: automation/sync-agent-native-starter-manifest
  AGENT_NATIVE_REPO: BuilderIO/agent-native

jobs:
  sync:
    name: Sync manifest from templates/chat
    runs-on: ubuntu-latest

    steps:
      - name: Generate app token
        id: app-token
        continue-on-error: true
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BUILDER_BOT_FOR_LINT_APP_ID }}
          private-key: ${{ secrets.BUILDER_BOT_FOR_LINT_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token || github.token }}
          path: starter
          fetch-depth: 0

      - uses: actions/checkout@v4
        with:
          repository: ${{ env.AGENT_NATIVE_REPO }}
          ref: main
          path: agent-native

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 10.29.1

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install agent-native tooling
        working-directory: agent-native
        run: pnpm install --frozen-lockfile

      - name: Sync starter from templates/chat
        working-directory: agent-native
        run: |
          pnpm exec tsx scripts/sync-builder-starter-manifest.ts merge \
            --starter-dir ../starter \
            --write

      - name: Install synced dependencies
        working-directory: starter
        run: pnpm install --no-frozen-lockfile

      - name: Format synced manifest files
        working-directory: starter
        run: |
          if pnpm exec oxfmt --write package.json pnpm-workspace.yaml 2>/dev/null; then
            echo "Formatted with oxfmt."
          else
            pnpm exec prettier --write package.json pnpm-workspace.yaml
          fi

      - name: Detect starter sync changes
        id: diff
        working-directory: starter
        run: |
          mapfile -t SYNC_PATHS < <(pnpm --dir ../agent-native exec tsx scripts/sync-builder-starter-manifest.ts paths)
          if git diff --quiet -- "${SYNC_PATHS[@]}"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Close stale sync PR
        if: steps.diff.outputs.changed == 'false'
        working-directory: starter
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
        run: |
          pr_number="$(gh pr list --head "$UPDATE_BRANCH" --state open --json number --jq '.[0].number // ""')"
          if [ -n "$pr_number" ]; then
            gh pr close "$pr_number" \
              --comment "Starter already matches templates/chat; closing this stale sync PR." \
              --delete-branch
          fi
          echo "Starter already matches templates/chat."

      - name: Run checks
        if: steps.diff.outputs.changed == 'true'
        working-directory: starter
        run: |
          if pnpm exec oxfmt --check package.json pnpm-workspace.yaml 2>/dev/null; then
            echo "Manifest formatting verified with oxfmt."
          else
            pnpm exec prettier --check package.json pnpm-workspace.yaml
          fi
          pnpm typecheck
          pnpm build

      - name: Commit update branch
        if: steps.diff.outputs.changed == 'true'
        id: commit
        working-directory: starter
        run: |
          mapfile -t SYNC_PATHS < <(pnpm --dir ../agent-native exec tsx scripts/sync-builder-starter-manifest.ts paths)
          git config user.name "builder-bot"
          git config user.email "builder-bot@users.noreply.github.com"
          git checkout -B "$UPDATE_BRANCH"
          git add -- "${SYNC_PATHS[@]}"
          if git diff --cached --quiet; then
            echo "Starter matches templates/chat after formatting; nothing to commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore: sync agent-native starter from templates/chat"
          git push --force-with-lease origin "$UPDATE_BRANCH"
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Open or update PR
        if: steps.commit.outputs.committed == 'true'
        id: pr
        working-directory: starter
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          cat > /tmp/sync-agent-native-starter-pr.md <<'EOF'
          This automated PR syncs Builder Agent Native Starter with the standalone snapshot generated from `BuilderIO/agent-native` → `templates/chat`.

          Updated files:
          - `package.json` and `pnpm-workspace.yaml` — dependencies, scripts, engines, and pnpm config
          - Toolchain files (`react-router.config.ts`, `vite.config.ts`, `tsconfig.json`, server plugins, etc.) that must stay aligned for typecheck/build

          Preserved starter-specific fields:
          - `name`, `displayName`, `description`
          - pinned `@agent-native/core` semver (Fusion policy)
          - starter-only scripts/deps such as Neon/Drizzle helpers

          Checks run before opening/updating this PR:
          - `pnpm typecheck`
          - `pnpm build`
          EOF

          pr_number="$(gh pr list --head "$UPDATE_BRANCH" --state open --json number --jq '.[0].number // ""')"
          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" \
              --title "chore: sync agent-native starter from templates/chat" \
              --body-file /tmp/sync-agent-native-starter-pr.md
          else
            gh pr create \
              --base "$BASE_BRANCH" \
              --head "$UPDATE_BRANCH" \
              --title "chore: sync agent-native starter from templates/chat" \
              --body-file /tmp/sync-agent-native-starter-pr.md
            pr_number="$(gh pr list --head "$UPDATE_BRANCH" --state open --json number --jq '.[0].number')"
          fi
          echo "number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Auto-merge sync PR
        if: steps.commit.outputs.committed == 'true'
        working-directory: starter
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
        run: gh pr merge "${{ steps.pr.outputs.number }}" --squash --delete-branch
