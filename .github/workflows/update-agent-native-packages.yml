name: Update agent-native packages

on:
  workflow_dispatch:
  schedule:
    # Safety net for npm publishes that do not send the repository_dispatch.
    - cron: "23 * * * *"
  repository_dispatch:
    types: [agent-native-packages-published]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: starter-agent-native-automation
  cancel-in-progress: true

env:
  UPDATE_BRANCH: automation/update-agent-native-packages
  AGENT_NATIVE_REPO: BuilderIO/agent-native

jobs:
  update:
    name: Sync manifest and pin @agent-native/core
    runs-on: ubuntu-latest

    steps:
      - name: Generate app token
        id: app-token
        continue-on-error: true
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BUILDER_BOT_FOR_LINT_APP_ID }}
          private-key: ${{ secrets.BUILDER_BOT_FOR_LINT_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token || github.token }}
          path: starter
          fetch-depth: 0

      - uses: actions/checkout@v4
        with:
          repository: ${{ env.AGENT_NATIVE_REPO }}
          ref: main
          path: agent-native

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 10.29.1

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install agent-native tooling
        working-directory: agent-native
        run: pnpm install --frozen-lockfile

      - name: Sync starter manifest from templates/chat
        working-directory: agent-native
        run: |
          pnpm exec tsx scripts/sync-builder-starter-manifest.ts merge \
            --starter-package-json ../starter/package.json \
            --starter-pnpm-workspace ../starter/pnpm-workspace.yaml \
            --write

      - name: Read published core version
        id: versions
        run: |
          echo "core=$(pnpm view @agent-native/core version)" >> "$GITHUB_OUTPUT"

      - name: Pin @agent-native/core in package.json
        working-directory: starter
        env:
          CORE_VERSION: ${{ steps.versions.outputs.core }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const coreVersion = process.env.CORE_VERSION;
          const packagePath = "package.json";
          const pkg = JSON.parse(fs.readFileSync(packagePath, "utf8"));
          const current = pkg.dependencies?.["@agent-native/core"];

          pkg.dependencies["@agent-native/core"] = coreVersion;
          fs.writeFileSync(packagePath, `${JSON.stringify(pkg, null, 2)}\n`);
          console.log(
            `Set @agent-native/core from ${current ?? "(missing)"} to ${coreVersion}.`,
          );
          NODE

      - name: Install synced dependencies
        working-directory: starter
        run: pnpm install --no-frozen-lockfile

      - name: Format manifest files
        working-directory: starter
        run: pnpm exec prettier --write package.json pnpm-workspace.yaml

      - name: Detect manifest and package changes
        id: diff
        working-directory: starter
        run: |
          if git diff --quiet -- package.json pnpm-workspace.yaml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Close stale update PR
        if: steps.diff.outputs.changed == 'false'
        working-directory: starter
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
        run: |
          pr_number="$(gh pr list --head "$UPDATE_BRANCH" --state open --json number --jq '.[0].number // ""')"
          if [ -n "$pr_number" ]; then
            gh pr close "$pr_number" \
              --comment "Starter manifest and @agent-native/core pin already match upstream; closing this stale updater PR." \
              --delete-branch
          fi
          echo "Already synced with templates/chat and pinned to @agent-native/core@${{ steps.versions.outputs.core }}."

      - name: Run checks
        if: steps.diff.outputs.changed == 'true'
        working-directory: starter
        run: |
          pnpm exec prettier --check package.json pnpm-workspace.yaml
          pnpm typecheck
          pnpm build

      - name: Commit update branch
        if: steps.diff.outputs.changed == 'true'
        id: commit
        working-directory: starter
        run: |
          git config user.name "builder-bot"
          git config user.email "builder-bot@users.noreply.github.com"
          git checkout -B "$UPDATE_BRANCH"
          git add package.json pnpm-workspace.yaml
          if git diff --cached --quiet; then
            echo "Manifest and core pin already match upstream after formatting; nothing to commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore: update agent-native packages"
          git push --force-with-lease origin "$UPDATE_BRANCH"
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Open or update PR
        if: steps.commit.outputs.committed == 'true'
        id: pr
        working-directory: starter
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
          CORE_VERSION: ${{ steps.versions.outputs.core }}
        run: |
          cat > /tmp/update-agent-native-pr.md <<EOF
          This automated PR syncs Builder Agent Native Starter with \`templates/chat\` and pins the latest published \`@agent-native/core\`.

          Updated files:
          - \`package.json\` — manifest from \`templates/chat\` plus pinned core
          - \`pnpm-workspace.yaml\` — standalone allowBuilds/overrides

          Latest version at update time:
          - \`@agent-native/core\`: \`$CORE_VERSION\`

          This repo does not commit \`pnpm-lock.yaml\`; Fusion generates one on first install. The pinned semver in \`package.json\` is the source of truth for cloud dev.

          Checks run before opening/updating this PR:
          - \`pnpm typecheck\`
          - \`pnpm build\`
          EOF

          pr_number="$(gh pr list --head "$UPDATE_BRANCH" --state open --json number --jq '.[0].number // ""')"
          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" \
              --title "chore: update agent-native packages" \
              --body-file /tmp/update-agent-native-pr.md
          else
            gh pr create \
              --base "$BASE_BRANCH" \
              --head "$UPDATE_BRANCH" \
              --title "chore: update agent-native packages" \
              --body-file /tmp/update-agent-native-pr.md
            pr_number="$(gh pr list --head "$UPDATE_BRANCH" --state open --json number --jq '.[0].number')"
          fi
          echo "number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Auto-merge update PR
        if: steps.commit.outputs.committed == 'true'
        working-directory: starter
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
        run: gh pr merge "${{ steps.pr.outputs.number }}" --squash --delete-branch
